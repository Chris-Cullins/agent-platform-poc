# Minimal kagent install for the local sandbox.
#
# The API key is intentionally supplied by scripts/bootstrap-stack.sh via
# --set providers.openAI.apiKey=... so no secret material is committed here.
providers:
  default: openAI
  openAI:
    apiKey: ""

agents:
  argo-rollouts-agent:
    enabled: false
  cilium-debug-agent:
    enabled: false
  cilium-manager-agent:
    enabled: false
  cilium-policy-agent:
    enabled: false
  helm-agent:
    enabled: false
  istio-agent:
    enabled: false
  k8s-agent:
    enabled: false
  kgateway-agent:
    enabled: false
  observability-agent:
    enabled: false
  promql-agent:
    enabled: false

